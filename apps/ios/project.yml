name: LumaStageTracker
options:
  bundleIdPrefix: com.lumastage
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic
targets:
  LumaStageTracker:
    type: application
    platform: iOS
    info:
      path: LumaStageTracker/Info.plist
      properties:
        CFBundleDisplayName: LumaStage
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        NSCameraUsageDescription: LumaStage uses the TrueDepth camera to calculate facial expressions for your avatar. Camera images never leave this device.
        NSLocalNetworkUsageDescription: LumaStage sends expression coefficients to your desktop over your local network.
        NSBonjourServices:
          - _lumastage._tcp
        UIRequiredDeviceCapabilities:
          - arm64
          - front-facing-camera
    sources:
      - LumaStageTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumastage.tracker
        PRODUCT_NAME: LumaStage Tracker
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
