name: iOS CI

on:
  push:
    paths: ["apps/ios/**", ".github/workflows/ios-ci.yml"]
  pull_request:
    paths: ["apps/ios/**", ".github/workflows/ios-ci.yml"]
  workflow_dispatch:

jobs:
  unsigned-device-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - working-directory: apps/ios
        run: xcodegen generate --spec project.yml
      - name: Build unsigned archive
        working-directory: apps/ios
        run: >-
          xcodebuild -project LumaStageTracker.xcodeproj
          -scheme LumaStageTracker -configuration Release
          -destination 'generic/platform=iOS'
          -archivePath build/LumaStageTracker.xcarchive
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          CODE_SIGN_IDENTITY=""
          archive
      - name: Package unsigned IPA
        working-directory: apps/ios
        run: |
          set -euo pipefail
          VERSION=$(awk '/^[[:space:]]*MARKETING_VERSION:/{print $2; exit}' project.yml)
          VERSION=${VERSION:-0.1.1}
          OUT_DIR="../../outputs/ios"
          mkdir -p "$OUT_DIR"
          APP="build/LumaStageTracker.xcarchive/Products/Applications/LumaStage Tracker.app"
          if [ ! -d "$APP" ]; then
            APP=$(find build/LumaStageTracker.xcarchive/Products/Applications -name "*.app" -maxdepth 1 | head -n1)
          fi
          test -d "$APP"
          echo "Using app: $APP version=$VERSION"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP" "Payload/"
          IPA="$OUT_DIR/LumaStage-Tracker-${VERSION}-unsigned.ipa"
          rm -f "$IPA"
          ditto -c -k --sequesterRsrc --keepParent Payload "$IPA" 2>/dev/null || zip -r -y "$IPA" Payload
          ls -lh "$IPA"
          # ensure single-line clean filename
          test -f "$IPA"
      - uses: actions/upload-artifact@v4
        with:
          name: LumaStage-iOS-Tracker
          path: outputs/ios/LumaStage-Tracker-*.ipa
          if-no-files-found: error